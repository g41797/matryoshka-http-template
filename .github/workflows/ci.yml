name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        opt: [none, minimal, size, speed, aggressive]
        pkg:
          - pipeline
          - spawn
          - adapter/http
          - examples

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03

      - name: Build ${{ matrix.pkg }}
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./${{ matrix.pkg }}/ -build-mode:lib -vet -strict-style -o:none -debug
          else
            odin build ./${{ matrix.pkg }}/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }}
          fi

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        opt: [none, minimal, size, speed, aggressive]
        pkg:
          - tests/unit/pipeline
          - tests/unit/adapter
          - tests/functional

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03

      - name: Test ${{ matrix.pkg }}
        shell: bash
        run: |
          # On Windows, odin-http uses a single global IOCP shared across all nbio event loops.
          # Running two echo servers in parallel (two test threads) creates a race during shutdown
          # where each server's nbio.run() may dequeue the other's accept-cancellation completion.
          # Forcing ODIN_TEST_THREADS=1 makes functional tests run serially, one server at a time,
          # which eliminates the race. Linux/macOS are unaffected (they use per-thread io_uring/kqueue).
          THREAD_FLAGS=""
          if [ "${{ runner.os }}" = "Windows" ] && [ "${{ matrix.pkg }}" = "tests/functional" ]; then
            THREAD_FLAGS="-define:ODIN_TEST_THREADS=1"
          fi
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin test ./${{ matrix.pkg }}/ -vet -strict-style -disallow-do -o:none -debug $THREAD_FLAGS
          else
            odin test ./${{ matrix.pkg }}/ -vet -strict-style -disallow-do -o:${{ matrix.opt }} $THREAD_FLAGS
          fi
