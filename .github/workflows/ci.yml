name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        opt: [none, minimal, size, speed, aggressive]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-03

      - name: Build pipeline/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./pipeline/ -build-mode:lib -vet -strict-style -o:none -debug
          else
            odin build ./pipeline/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }}
          fi

      - name: Build spawn/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./spawn/ -build-mode:lib -vet -strict-style -o:none -debug
          else
            odin build ./spawn/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }}
          fi

      - name: Build adapter/http/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./adapter/http/ -build-mode:lib -vet -strict-style -o:none -debug
          else
            odin build ./adapter/http/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }}
          fi

      - name: Build examples/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin build ./examples/ -build-mode:lib -vet -strict-style -o:none -debug
          else
            odin build ./examples/ -build-mode:lib -vet -strict-style -o:${{ matrix.opt }}
          fi

      - name: Test tests/unit/pipeline/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin test ./tests/unit/pipeline/ -vet -strict-style -disallow-do -o:none -debug
          else
            odin test ./tests/unit/pipeline/ -vet -strict-style -disallow-do -o:${{ matrix.opt }}
          fi

      - name: Test tests/unit/adapter/
        shell: bash
        run: |
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin test ./tests/unit/adapter/ -vet -strict-style -disallow-do -o:none -debug
          else
            odin test ./tests/unit/adapter/ -vet -strict-style -disallow-do -o:${{ matrix.opt }}
          fi

      - name: Test tests/functional/
        shell: bash
        run: |
          # On Windows, odin-http uses a single global IOCP shared across all nbio event loops.
          # Running two echo servers in parallel (two test threads) creates a race during shutdown
          # where each server's nbio.run() may dequeue the other's accept-cancellation completion.
          # Forcing ODIN_TEST_THREADS=1 makes functional tests run serially, one server at a time,
          # which eliminates the race. Linux/macOS are unaffected (they use per-thread io_uring/kqueue).
          THREAD_FLAGS=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            THREAD_FLAGS="-define:ODIN_TEST_THREADS=1"
          fi
          if [ "${{ matrix.opt }}" = "none" ]; then
            odin test ./tests/functional/ -vet -strict-style -disallow-do -o:none -debug $THREAD_FLAGS
          else
            odin test ./tests/functional/ -vet -strict-style -disallow-do -o:${{ matrix.opt }} $THREAD_FLAGS
          fi
